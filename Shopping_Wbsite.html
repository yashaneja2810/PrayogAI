<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shoply — Demo Shopping SPA</title>
  <style>
    :root{
      --bg:#f6f7fb;--card:#ffffff;--muted:#6b7280;--accent:#0ea5a4;--accent-2:#0369a1;--danger:#ef4444;--glass: rgba(255,255,255,0.6);
      --maxw:1100px;
    }
    [data-theme='dark']{ --bg:#0b1220; --card:#0f1724; --muted:#9ca3af; --accent:#34d399; --accent-2:#38bdf8; --glass: rgba(255,255,255,0.03);} 
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial; background:var(--bg); color: #0f1724;}
    header{background:linear-gradient(90deg,var(--card),transparent); position:sticky;top:0;z-index:50;padding:.6rem 1rem;backdrop-filter: blur(6px);border-bottom:1px solid rgba(0,0,0,0.04)}
    .wrap{max-width:var(--maxw);margin:0 auto;display:flex;gap:1rem;align-items:center}
    .logo{font-weight:700;letter-spacing:.6px;color:var(--accent-2)}
    nav{margin-left:1rem}
    nav a{margin-right:.6rem;text-decoration:none;color:var(--muted);font-weight:600}
    .search{flex:1;display:flex;align-items:center;gap:.5rem}
    .search input{flex:1;padding:.5rem .75rem;border-radius:8px;border:1px solid rgba(0,0,0,0.06);background:transparent}
    .icon-btn{background:var(--card);border:1px solid rgba(0,0,0,0.06);padding:.45rem;border-radius:8px;cursor:pointer}
    main{max-width:var(--maxw);margin:1.2rem auto;padding:1rem}
    .grid{display:grid;grid-template-columns:1fr 320px;gap:1rem}
    .card{background:var(--card);border-radius:12px;padding:1rem;border:1px solid rgba(0,0,0,0.05)}
    .products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .product{padding:.6rem;border-radius:10px;background:linear-gradient(180deg,rgba(0,0,0,0.01),transparent);display:flex;flex-direction:column;gap:.6rem}
    .product img{width:100%;height:140px;object-fit:cover;border-radius:8px}
    .btn{display:inline-block;padding:.5rem .75rem;border-radius:8px;background:var(--accent);color:white;text-decoration:none;font-weight:700;cursor:pointer}
    .btn.secondary{background:transparent;color:var(--accent-2);border:1px solid rgba(0,0,0,0.06)}
    .muted{color:var(--muted);font-size:.95rem}
    aside .mini{display:flex;flex-direction:column;gap:.6rem}
    .meta{display:flex;justify-content:space-between;align-items:center}
    footer{max-width:var(--maxw);margin:2rem auto;padding:1rem;color:var(--muted)}
    .chip{padding:.25rem .5rem;border-radius:999px;border:1px solid rgba(0,0,0,0.06);cursor:pointer}
    .controls{display:flex;gap:.5rem;align-items:center}
    .list-row{display:flex;gap:.5rem;align-items:center}
    .product-title{font-weight:700}
    .rating{font-size:.9rem;color:#f59e0b}
    .empty{padding:2rem;text-align:center;color:var(--muted)}
    .link{color:var(--accent-2);cursor:pointer}
    /* responsive */
    @media(max-width:900px){.grid{grid-template-columns:1fr} aside{order:2}.wrap{flex-wrap:wrap}.search{order:2;width:100%}}
  </style>
</head>
<body>
  <header data-theme-toggle>
    <div class="wrap">
      <div style="display:flex;align-items:center;gap:.6rem">
        <div class="logo">Shoply</div>
        <nav>
          <a href="#home">Home</a>
          <a href="#products">Products</a>
          <a href="#orders">Orders</a>
          <a href="#account">Account</a>
          <a href="#settings">Settings</a>
        </nav>
      </div>
      <div class="search">
        <input id="searchInput" placeholder="Search products, categories or brands..." />
        <button class="icon-btn" id="searchBtn">🔎</button>
        <button class="icon-btn" id="cartToggle">🛒 <span id="cartCount">0</span></button>
        <button class="icon-btn" id="themeToggle">🌓</button>
      </div>
    </div>
  </header>

  <main>
    <div id="view"></div>
  </main>

  <footer>
    <div class="wrap" style="justify-content:space-between;align-items:flex-start">
      <div>
        <strong>Shoply</strong>
        <div class="muted">Demo shopping site — client-side single-file SPA for prototyping.</div>
      </div>
      <div class="muted">© Shoply Demo. Not for production use.</div>
    </div>
  </footer>

  <template id="tpl-home">
    <div class="card">
      <h2>Welcome to Shoply</h2>
      <p class="muted">A fully client-side demo shopping SPA with products, cart, wishlist, orders, settings and account (no login required).</p>
      <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap">
        <a class="btn" href="#products">Shop Now</a>
        <a class="btn secondary" href="#faq">Help / FAQ</a>
      </div>
    </div>
    <div style="height:1rem"></div>
    <div class="grid">
      <section>
        <div class="card">
          <h3>Featured Products</h3>
          <div id="featured" style="margin-top:.8rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.6rem"></div>
        </div>

        <div style="height:1rem"></div>
        <div class="card">
          <h3>Top Categories</h3>
          <div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap" id="homeCategories"></div>
        </div>
      </section>
      <aside class="card">
        <h3>Your Cart (Quick)</h3>
        <div id="miniCart"></div>
        <div style="height:1rem"></div>
        <h3>Quick Filters</h3>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem">
          <span class="chip" data-filter="electronics">Electronics</span>
          <span class="chip" data-filter="clothing">Clothing</span>
          <span class="chip" data-filter="home">Home</span>
          <span class="chip" data-filter="beauty">Beauty</span>
        </div>
      </aside>
    </div>
  </template>

  <template id="tpl-products">
    <div class="grid">
      <section>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <h3>Products</h3>
            <div class="controls">
              <select id="sortSelect" aria-label="Sort">
                <option value="new">Newest</option>
                <option value="price-asc">Price: Low → High</option>
                <option value="price-desc">Price: High → Low</option>
                <option value="rating">Top Rated</option>
              </select>
              <select id="perPage" aria-label="Per page">
                <option>8</option>
                <option>12</option>
                <option>20</option>
              </select>
            </div>
          </div>
          <div style="display:flex;gap:1rem;margin-top:.8rem;align-items:center">
            <div><input id="filterCategory" placeholder="Category" /></div>
            <div><input id="filterMin" placeholder="Min price" type="number" /></div>
            <div><input id="filterMax" placeholder="Max price" type="number" /></div>
            <div><button class="btn" id="applyFilters">Apply</button></div>
            <div><button class="btn secondary" id="clearFilters">Clear</button></div>
          </div>
          <div id="productList" style="margin-top:.8rem"></div>
          <div id="pagination" style="margin-top:.8rem;display:flex;gap:.5rem;align-items:center"></div>
        </div>
      </section>
      <aside>
        <div class="card">
          <h3>Wishlist</h3>
          <div id="wishlist"></div>
        </div>
        <div style="height:1rem"></div>
        <div class="card">
          <h3>Cart Summary</h3>
          <div id="cartSummary"></div>
        </div>
      </aside>
    </div>
  </template>

  <template id="tpl-product-detail">
    <div class="card">
      <div style="display:flex;gap:1rem;align-items:flex-start">
        <img id="detailImg" style="width:320px;height:320px;object-fit:cover;border-radius:8px" />
        <div style="flex:1">
          <h2 id="detailTitle"></h2>
          <div class="muted" id="detailBrand"></div>
          <div style="margin-top:.6rem;font-size:1.25rem;font-weight:800" id="detailPrice"></div>
          <div style="margin-top:.6rem" id="detailDesc"></div>
          <div style="margin-top:1rem;display:flex;gap:.6rem">
            <button class="btn" id="addToCartBtn">Add to cart</button>
            <button class="btn secondary" id="addToWishlistBtn">Add to wishlist</button>
            <div style="margin-left:auto" id="stockInfo" class="muted"></div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-cart">
    <div class="card">
      <h3>Your Cart</h3>
      <div id="cartItems"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem">
        <div class="muted" id="cartTotals"></div>
        <div style="display:flex;gap:.5rem">
          <button class="btn secondary" id="clearCart">Clear</button>
          <button class="btn" id="checkoutBtn">Checkout</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-checkout">
    <div class="card">
      <h3>Checkout</h3>
      <div class="muted">This is a mock checkout — no payments are processed. Orders are stored in your browser's localStorage.</div>
      <div style="margin-top:1rem">
        <label>Full name</label>
        <input id="shipName" placeholder="Full name" />
        <label>Address</label>
        <input id="shipAddress" placeholder="Address, city, state, ZIP" />
        <label>Phone</label>
        <input id="shipPhone" placeholder="Phone or contact" />
      </div>
      <div style="margin-top:1rem;display:flex;gap:.5rem">
        <button class="btn" id="placeOrder">Place Order</button>
        <button class="btn secondary" id="cancelOrder">Cancel</button>
      </div>
    </div>
  </template>

  <template id="tpl-orders">
    <div class="card">
      <h3>Your Orders</h3>
      <div id="ordersList"></div>
    </div>
  </template>

  <template id="tpl-account">
    <div class="card">
      <h3>Account (No login required)</h3>
      <div class="muted">Your profile is stored locally in this browser only.</div>
      <div style="margin-top:.8rem;display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
        <div>
          <label>Full name</label>
          <input id="acctName" />
        </div>
        <div>
          <label>Email</label>
          <input id="acctEmail" />
        </div>
        <div style="grid-column:1/3">
          <label>Default address</label>
          <input id="acctAddress" />
        </div>
        <div style="grid-column:1/3;display:flex;gap:.5rem;justify-content:flex-end">
          <button class="btn" id="saveProfile">Save Profile</button>
          <button class="btn secondary" id="resetProfile">Reset</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-settings">
    <div class="card">
      <h3>Settings</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.6rem">
        <div>
          <label>Theme</label>
          <select id="uiTheme"><option value="auto">System</option><option value="light">Light</option><option value="dark">Dark</option></select>
        </div>
        <div>
          <label>Currency</label>
          <select id="currency"><option>USD</option><option>INR</option><option>EUR</option></select>
        </div>
        <div>
          <label>Items per page</label>
          <select id="itemsPerPage"><option>8</option><option>12</option><option>20</option></select>
        </div>
        <div>
          <label>Enable suggestions</label>
          <select id="enableSuggestions"><option value="true">True</option><option value="false">False</option></select>
        </div>
        <div style="grid-column:1/3;display:flex;justify-content:flex-end;gap:.5rem">
          <button class="btn" id="saveSettings">Save</button>
          <button class="btn secondary" id="resetSettings">Reset</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-faq">
    <div class="card">
      <h3>Help & FAQ</h3>
      <div style="margin-top:.6rem">
        <h4>How do I add items to the cart?</h4>
        <p class="muted">From products list or product detail click "Add to cart". Use the cart page to update quantities or remove items.</p>
        <h4>How do orders work?</h4>
        <p class="muted">This demo creates mock orders stored in your browser. No payment integration.</p>
        <h4>Where is my data stored?</h4>
        <p class="muted">Profile, cart, wishlist and orders are stored in your browser's localStorage only.</p>
      </div>
    </div>
  </template>

  <script>
    /* -------------------- Data layer -------------------- */
    const PRODUCTS = (()=>{
      const now = Date.now();
      return [
        {id:'p1',title:'Smart Watch X200',brand:'TimeTech',price:129.99,cat:'electronics',rating:4.5,stock:24,desc:'24/7 health tracking, GPS, water-resistant',img:'https://picsum.photos/seed/p1/600/400',created:now-1000*60*60*24*3},
        {id:'p2',title:'NoiseCancel Headphones',brand:'SoundLet',price:89.99,cat:'electronics',rating:4.6,stock:12,desc:'Active noise cancellation with 30h battery',img:'https://picsum.photos/seed/p2/600/400',created:now-1000*60*60*24*10},
        {id:'p3',title:'Running Shoes - Aero',brand:'SprintPro',price:59.99,cat:'clothing',rating:4.2,stock:40,desc:'Breathable running shoes with cushioned sole',img:'https://picsum.photos/seed/p3/600/400',created:now-1000*60*60*24*30},
        {id:'p4',title:'Ceramic Coffee Mug',brand:'HomeBrew',price:12.50,cat:'home',rating:4.1,stock:150,desc:'12oz ceramic mug, microwave safe',img:'https://picsum.photos/seed/p4/600/400',created:now-1000*60*60*24*5},
        {id:'p5',title:'Organic Face Cream',brand:'GlowSkin',price:24.99,cat:'beauty',rating:4.7,stock:60,desc:'Natural ingredients for daily moisturizing',img:'https://picsum.photos/seed/p5/600/400',created:now-1000*60*60*24*2},
        {id:'p6',title:'Bluetooth Speaker Mini',brand:'BoomBox',price:34.99,cat:'electronics',rating:4.0,stock:8,desc:'Portable speaker, 10h playtime',img:'https://picsum.photos/seed/p6/600/400',created:now-1000*60*60*24*7},
        {id:'p7',title:'Yoga Mat Pro',brand:'FlexFit',price:29.99,cat:'home',rating:4.3,stock:30,desc:'Non-slip yoga mat with extra cushioning',img:'https://picsum.photos/seed/p7/600/400',created:now-1000*60*60*24*14},
        {id:'p8',title:'Classic Denim Jacket',brand:'UrbanWear',price:74.99,cat:'clothing',rating:4.4,stock:20,desc:'Stylish denim jacket, unisex fit',img:'https://picsum.photos/seed/p8/600/400',created:now-1000*60*60*24*40},
        {id:'p9',title:'Electric Kettle 1.7L',brand:'HotSip',price:39.99,cat:'home',rating:4.2,stock:22,desc:'Quick boil kettle with auto shut-off',img:'https://picsum.photos/seed/p9/600/400',created:now-1000*60*60*24*20},
        {id:'p10',title:'Sunscreen SPF50',brand:'SunGuard',price:15.99,cat:'beauty',rating:4.6,stock:85,desc:'Lightweight, non-greasy sunscreen',img:'https://picsum.photos/seed/p10/600/400',created:now-1000*60*60*24*1}
      ];
    })();

    /* -------------------- Utilities -------------------- */
    const $ = sel=>document.querySelector(sel);
    const qs = sel=>Array.from(document.querySelectorAll(sel));
    const format = (n,currency)=>{
      if(!currency || currency==='USD') return '$'+Number(n).toFixed(2);
      if(currency==='INR') return '₹'+Number(n).toFixed(2);
      if(currency==='EUR') return '€'+Number(n).toFixed(2);
      return Number(n).toFixed(2)+' '+currency;
    }

    /* -------------------- Persistence -------------------- */
    const Storage = {
      get(k, fallback){try{const v=localStorage.getItem(k); return v?JSON.parse(v):fallback;}catch(e){return fallback}},
      set(k,v){localStorage.setItem(k,JSON.stringify(v))}
    }

    const state = {
      products: PRODUCTS.slice(),
      cart: Storage.get('cart',{}),
      wishlist: Storage.get('wishlist',[]),
      profile: Storage.get('profile',{name:'',email:'',address:''}),
      orders: Storage.get('orders',[]),
      settings: Storage.get('settings',{theme:'auto',currency:'USD',itemsPerPage:8,enableSuggestions:true})
    }

    /* -------------------- Router / View management -------------------- */
    function render(){
      const hash = location.hash.replace('#','') || 'home';
      const [route, param] = hash.split('/');
      const view = $('#view'); view.innerHTML = '';
      if(route==='home') renderHome(view);
      else if(route==='products') renderProducts(view);
      else if(route==='product' && param) renderProductDetail(view,param);
      else if(route==='cart') renderCart(view);
      else if(route==='checkout') renderCheckout(view);
      else if(route==='orders') renderOrders(view);
      else if(route==='account') renderAccount(view);
      else if(route==='settings') renderSettings(view);
      else if(route==='faq') renderFAQ(view);
      else renderHome(view);
      updateCartCount();
    }

    /* -------------------- Components / pages -------------------- */
    function renderHome(container){
      const tpl = document.getElementById('tpl-home').content.cloneNode(true);
      container.appendChild(tpl);
      // featured
      const feat = container.querySelector('#featured');
      const featuredProducts = state.products.slice(0,6);
      featuredProducts.forEach(p=>{
        const el = document.createElement('div'); el.className='product';
        el.innerHTML = `<img src='${p.img}' alt='' loading='lazy'><div class='product-title'>${p.title}</div><div class='muted'>${p.brand} • ${format(p.price,state.settings.currency)}</div><div style='margin-top:.4rem'><a class='link' href='#product/${p.id}'>View</a> · <span class='link' data-add='${p.id}'>Add</span></div>`;
        feat.appendChild(el);
      });
      // categories
      const cats = [...new Set(state.products.map(p=>p.cat))];
      cats.forEach(c=>{ const sp = document.createElement('span'); sp.className='chip'; sp.textContent=c; sp.onclick=()=>{location.hash='#products'; setTimeout(()=>{ $('#filterCategory').value=c; $('#applyFilters').click(); },100)}; container.querySelector('#homeCategories').appendChild(sp) });
      // mini cart
      renderMiniCart(container.querySelector('#miniCart'));
      // hook featured add
      qs('[data-add]').forEach(btn=>btn.addEventListener('click',e=>{addToCart(e.target.dataset.add,1)}));
      qs('.chip[data-filter]').forEach(c=>c.addEventListener('click',()=>{location.hash='#products'; setTimeout(()=>{ $('#filterCategory').value=c.dataset.filter; $('#applyFilters').click(); },100)}));
    }

    function renderProducts(container){
      const tpl = document.getElementById('tpl-products').content.cloneNode(true);
      container.appendChild(tpl);
      const productList = container.querySelector('#productList');
      const wishlistEl = container.querySelector('#wishlist');
      const cartSummary = container.querySelector('#cartSummary');

      let filters = {q:'',cat:'',min:0,max:Infinity};
      const sortSelect = container.querySelector('#sortSelect');
      const perPageSelect = container.querySelector('#perPage');
      perPageSelect.value = state.settings.itemsPerPage;

      function apply(){
        productList.innerHTML='';
        let list = state.products.slice();
        // text search
        const q = ($('#searchInput').value||'').toLowerCase(); if(q){ list = list.filter(p=> (p.title+p.brand+p.desc+p.cat).toLowerCase().includes(q)) }
        // category filter
        const cat = container.querySelector('#filterCategory').value || '';
        const min = Number(container.querySelector('#filterMin').value || 0);
        const max = Number(container.querySelector('#filterMax').value || Infinity);
        if(cat) list = list.filter(p=>p.cat.toLowerCase().includes(cat.toLowerCase()));
        list = list.filter(p=>p.price>=min && p.price<=max);
        // sort
        const sort = sortSelect.value;
        if(sort==='price-asc') list.sort((a,b)=>a.price-b.price);
        else if(sort==='price-desc') list.sort((a,b)=>b.price-a.price);
        else if(sort==='rating') list.sort((a,b)=>b.rating-a.rating);
        else list.sort((a,b)=>b.created - a.created);
        // pagination
        const per = Number(perPageSelect.value);
        const page = Number(container.querySelector('#pagination').dataset.page||1);
        const total = Math.max(1,Math.ceil(list.length/per));
        const start=(page-1)*per; const pageItems = list.slice(start,start+per);
        pageItems.forEach(p=>{
          const el = document.createElement('div'); el.className='product';
          el.innerHTML = `<img src='${p.img}' alt=''><div class='product-title'>${p.title}</div><div class='muted'>${p.brand} • ${format(p.price,state.settings.currency)}</div><div class='rating'>★ ${p.rating}</div><div style='display:flex;gap:.4rem;margin-top:.4rem'><a class='btn' href='#product/${p.id}'>Details</a><button class='btn secondary' data-add='${p.id}'>Add</button></div>`;
          productList.appendChild(el);
        });
        // pagination UI
        const pag = container.querySelector('#pagination'); pag.innerHTML=''; pag.dataset.page = page;
        const prev = document.createElement('button'); prev.textContent='‹ Prev'; prev.className='btn secondary'; prev.disabled = page<=1; prev.onclick=()=>{pag.dataset.page=page-1; apply()};
        const next = document.createElement('button'); next.textContent='Next ›'; next.className='btn'; next.disabled = page>=total; next.onclick=()=>{pag.dataset.page=page+1; apply()};
        pag.appendChild(prev); pag.appendChild(document.createElement('div')).textContent = ` Page ${page} of ${total} `; pag.appendChild(next);
        // bind add buttons
        qs('[data-add]').forEach(b=>{b.onclick=()=>addToCart(b.dataset.add,1)});

        // wishlist
        wishlistEl.innerHTML=''; (state.wishlist||[]).forEach(id=>{ const p = state.products.find(x=>x.id===id); if(p){ const r=document.createElement('div'); r.className='list-row'; r.innerHTML=`<div style='flex:1'>${p.title}</div><div><span class='link' data-remove='${id}'>Remove</span></div>`; wishlistEl.appendChild(r) } });
        qs('[data-remove]').forEach(b=>b.onclick=()=>{state.wishlist = state.wishlist.filter(i=>i!==b.dataset.remove); Storage.set('wishlist',state.wishlist); apply();});

        // cart summary
        cartSummary.innerHTML=''; const items = Object.values(state.cart); if(items.length===0) cartSummary.innerHTML='<div class="empty">Cart is empty</div>';
        else{ const subtotal = items.reduce((s,i)=>s + (i.price * i.qty),0); cartSummary.innerHTML = `<div>Items: ${items.reduce((s,i)=>s+i.qty,0)}</div><div>Subtotal: ${format(subtotal,state.settings.currency)}</div>` }
      }

      container.querySelector('#applyFilters').onclick = ()=>{container.querySelector('#pagination').dataset.page=1; apply()};
      container.querySelector('#clearFilters').onclick = ()=>{container.querySelector('#filterCategory').value=''; container.querySelector('#filterMin').value=''; container.querySelector('#filterMax').value=''; apply()};
      perPageSelect.onchange=()=>{ state.settings.itemsPerPage = Number(perPageSelect.value); Storage.set('settings',state.settings); apply(); }
      sortSelect.onchange = ()=>apply();
      container.querySelector('#pagination').dataset.page = 1;
      apply();
    }

    function renderProductDetail(container,id){
      const tpl = document.getElementById('tpl-product-detail').content.cloneNode(true);
      container.appendChild(tpl);
      const p = state.products.find(x=>x.id===id);
      if(!p){ container.innerHTML='<div class="empty">Product not found</div>'; return }
      container.querySelector('#detailImg').src = p.img;
      container.querySelector('#detailTitle').textContent = p.title;
      container.querySelector('#detailBrand').textContent = p.brand + ' • ' + p.cat;
      container.querySelector('#detailPrice').textContent = format(p.price,state.settings.currency);
      container.querySelector('#detailDesc').textContent = p.desc;
      container.querySelector('#stockInfo').textContent = p.stock>0?`${p.stock} in stock`:'Out of stock';
      container.querySelector('#addToCartBtn').onclick = ()=>addToCart(p.id,1);
      container.querySelector('#addToWishlistBtn').onclick = ()=>{ if(!state.wishlist.includes(p.id)){ state.wishlist.push(p.id); Storage.set('wishlist',state.wishlist); alert('Added to wishlist') } else { alert('Already in wishlist') } }
    }

    function renderCart(container){
      const tpl = document.getElementById('tpl-cart').content.cloneNode(true);
      container.appendChild(tpl);
      const itemsDiv = container.querySelector('#cartItems');
      function refresh(){ itemsDiv.innerHTML=''; const items = Object.values(state.cart); if(items.length===0) itemsDiv.innerHTML='<div class="empty">Your cart is empty</div>';
        items.forEach(i=>{
          const r = document.createElement('div'); r.className='list-row'; r.style.justifyContent='space-between'; r.innerHTML = `<div style='display:flex;gap:.6rem;align-items:center'><img src='${i.img}' style='width:72px;height:72px;object-fit:cover;border-radius:6px'><div><div class='product-title'>${i.title}</div><div class='muted'>${i.brand}</div></div></div><div style='display:flex;gap:.5rem;align-items:center'><input style='width:60px' type='number' min='1' value='${i.qty}' data-qty='${i.id}'><div>${format(i.price* i.qty,state.settings.currency)}</div><div><span class='link' data-remove='${i.id}'>Remove</span></div></div>`;
          itemsDiv.appendChild(r);
        });
        qs('[data-qty]').forEach(inp=>inp.onchange = ()=>{ const id=inp.dataset.qty; const val = Number(inp.value); if(val<=0) delete state.cart[id]; else state.cart[id].qty = val; Storage.set('cart',state.cart); refresh(); updateCartCount(); });
        qs('[data-remove]').forEach(b=>b.onclick=()=>{ delete state.cart[b.dataset.remove]; Storage.set('cart',state.cart); refresh(); updateCartCount(); });
        const subtotal = Object.values(state.cart).reduce((s,i)=>s + (i.price * i.qty),0);
        container.querySelector('#cartTotals').textContent = `Subtotal: ${format(subtotal,state.settings.currency)}`;
      }
      container.querySelector('#clearCart').onclick = ()=>{ state.cart = {}; Storage.set('cart',state.cart); refresh(); updateCartCount(); }
      container.querySelector('#checkoutBtn').onclick = ()=>{ location.hash='#checkout' }
      refresh();
    }

    function renderCheckout(container){
      const tpl = document.getElementById('tpl-checkout').content.cloneNode(true);
      container.appendChild(tpl);
      container.querySelector('#placeOrder').onclick = ()=>{
        const name = container.querySelector('#shipName').value || state.profile.name || 'Guest';
        const address = container.querySelector('#shipAddress').value || state.profile.address || 'N/A';
        const phone = container.querySelector('#shipPhone').value || '';
        const items = Object.values(state.cart);
        if(items.length===0){ alert('Your cart is empty'); return }
        const order = {id:'ORD-'+Math.random().toString(36).slice(2,9).toUpperCase(),date:new Date().toISOString(),name,address,phone,items,total:items.reduce((s,i)=>s+i.price*i.qty,0)};
        state.orders.unshift(order); Storage.set('orders',state.orders); state.cart = {}; Storage.set('cart',state.cart); alert('Order placed: '+order.id); location.hash='#orders';
      }
      container.querySelector('#cancelOrder').onclick = ()=>{ location.hash='#cart' }
    }

    function renderOrders(container){
      const tpl = document.getElementById('tpl-orders').content.cloneNode(true);
      container.appendChild(tpl);
      const list = container.querySelector('#ordersList');
      if(state.orders.length===0) list.innerHTML='<div class="empty">No orders yet</div>';
      else{ state.orders.forEach(o=>{ const el = document.createElement('div'); el.className='card'; el.style.marginBottom='8px'; el.innerHTML = `<div style='display:flex;justify-content:space-between'><div><strong>${o.id}</strong><div class='muted'>${new Date(o.date).toLocaleString()}</div></div><div style='text-align:right'><div>Total: ${format(o.total,state.settings.currency)}</div><div class='muted'>Ship to: ${o.name}</div></div></div>`; list.appendChild(el) }) }
    }

    function renderAccount(container){
      const tpl = document.getElementById('tpl-account').content.cloneNode(true);
      container.appendChild(tpl);
      const name = container.querySelector('#acctName'); const email = container.querySelector('#acctEmail'); const addr = container.querySelector('#acctAddress');
      name.value = state.profile.name || ''; email.value = state.profile.email || ''; addr.value = state.profile.address || '';
      container.querySelector('#saveProfile').onclick = ()=>{ state.profile = {name:name.value,email:email.value,address:addr.value}; Storage.set('profile',state.profile); alert('Profile saved locally'); }
      container.querySelector('#resetProfile').onclick = ()=>{ state.profile = {name:'',email:'',address:''}; Storage.set('profile',state.profile); name.value=''; email.value=''; addr.value=''; }
    }

    function renderSettings(container){
      const tpl = document.getElementById('tpl-settings').content.cloneNode(true);
      container.appendChild(tpl);
      const theme = container.querySelector('#uiTheme'); const currency = container.querySelector('#currency'); const itemsPerPage = container.querySelector('#itemsPerPage'); const suggest = container.querySelector('#enableSuggestions');
      theme.value = state.settings.theme||'auto'; currency.value = state.settings.currency||'USD'; itemsPerPage.value = state.settings.itemsPerPage||8; suggest.value = state.settings.enableSuggestions?'true':'false';
      container.querySelector('#saveSettings').onclick = ()=>{ state.settings.theme = theme.value; state.settings.currency = currency.value; state.settings.itemsPerPage = Number(itemsPerPage.value); state.settings.enableSuggestions = suggest.value==='true'; Storage.set('settings',state.settings); applyTheme(); alert('Settings saved') }
      container.querySelector('#resetSettings').onclick = ()=>{ state.settings = {theme:'auto',currency:'USD',itemsPerPage:8,enableSuggestions:true}; Storage.set('settings',state.settings); applyTheme(); render(); }
    }

    function renderFAQ(container){ const tpl = document.getElementById('tpl-faq').content.cloneNode(true); container.appendChild(tpl); }

    /* -------------------- Small components -------------------- */
    function renderMiniCart(container){ container.innerHTML=''; const items = Object.values(state.cart); if(items.length===0) container.innerHTML='<div class="empty">Cart empty</div>';
      else{ items.forEach(i=>{ const r = document.createElement('div'); r.className='list-row'; r.innerHTML = `<div style='flex:1'>${i.title} x ${i.qty}</div><div>${format(i.price*i.qty,state.settings.currency)}</div>`; container.appendChild(r) }) }
    }

    function updateCartCount(){ const count = Object.values(state.cart).reduce((s,i)=>s+i.qty,0); $('#cartCount').textContent = count; }

    function addToCart(id,qty=1){ const p = state.products.find(x=>x.id===id); if(!p) return; if(!state.cart[id]) state.cart[id] = {...p,qty:0}; state.cart[id].qty += qty; Storage.set('cart',state.cart); updateCartCount(); alert('Added to cart: '+p.title); }

    /* -------------------- Initialization -------------------- */
    function applyTheme(){ const t = state.settings.theme||'auto'; const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches; const theme = (t==='auto')?(prefersDark?'dark':'light'):t; if(theme==='dark') document.documentElement.setAttribute('data-theme','dark'); else document.documentElement.removeAttribute('data-theme'); }

    window.addEventListener('hashchange',render);
    document.addEventListener('DOMContentLoaded',()=>{
      applyTheme(); render();
      // header interactions
      $('#themeToggle').onclick = ()=>{ state.settings.theme = state.settings.theme==='dark'?'light':'dark'; Storage.set('settings',state.settings); applyTheme(); alert('Theme toggled') }
      $('#cartToggle').onclick = ()=>{ location.hash='#cart' }
      $('#searchBtn').onclick = ()=>{ location.hash='#products'; setTimeout(()=>{ const input = $('#searchInput'); if(input.value) { /* keep */ } else input.focus(); },100) }
      $('#searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ $('#searchBtn').click(); } })

      // global listeners
      document.body.addEventListener('click', e=>{
        // any link with data-route
        const a = e.target.closest('[data-route]'); if(a){ location.hash = a.dataset.route }
      })

      // prefill featured etc
      // remove prod images if blocked

      // quick persistence rescue
      state.cart = Storage.get('cart',state.cart);
      state.wishlist = Storage.get('wishlist',state.wishlist);
      state.profile = Storage.get('profile',state.profile);
      state.orders = Storage.get('orders',state.orders);
      state.settings = Storage.get('settings',state.settings);
      updateCartCount();
    });

    window.Shoply = {
      getProducts: ()=>state.products,
      getProductById: (id)=>state.products.find(p=>p.id===id),
      search: (q)=> state.products.filter(p=> (p.title+p.brand+p.desc+p.cat).toLowerCase().includes((q||'').toLowerCase())),
      getCart: ()=>state.cart,
      getWishlist: ()=>state.wishlist,
      getProfile: ()=>state.profile,
      getOrders: ()=>state.orders,
      placeMockOrder: (payload)=>{ const order = {id:'ORD-'+Math.random().toString(36).slice(2,9).toUpperCase(),date:new Date().toISOString(),...payload}; state.orders.unshift(order); Storage.set('orders',state.orders); return order }
    }
  </script>

</body>
</html>
